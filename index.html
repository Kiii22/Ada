<html lang="id">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050508;
            --card: #0f0f16;
            --card-hover: #1a1a24;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Exo 2', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 8px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary)
        }

        .bg-fx {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.1), transparent 40%), radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.1), transparent 40%), linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 1.5rem
        }

        header {
            background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1)
        }

        nav {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .logo {
            font-family: var(--font-head);
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .global-stats {
            display: flex;
            gap: 1.5rem;
            font-size: .8rem;
            color: var(--text-dim);
            display: none
        }

        @media(min-width:1024px) {
            .global-stats {
                display: flex
            }
        }

        .g-stat span {
            color: var(--green);
            font-family: var(--font-mono)
        }

        .ticker-wrap {
            overflow: hidden;
            background: var(--card);
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            padding: 10px 0;
            white-space: nowrap;
            margin-top: 70px
        }

        .ticker {
            display: inline-block;
            animation: scroll 40s linear infinite
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 20px;
            color: var(--text-dim);
            font-size: .9rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: .2s
        }

        .ticker-item:hover {
            background: #222;
            color: var(--text)
        }

        .ticker-item img {
            width: 20px;
            height: 20px
        }

        @keyframes scroll {
            0% {
                transform: translateX(0)
            }

            100% {
                transform: translateX(-50%)
            }
        }

        .dash-grid {
            display: grid;
            grid-template-columns: 300px 1fr 400px;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-bottom: 3rem
        }

        @media(max-width:1200px) {
            .dash-grid {
                grid-template-columns: 1fr 400px
            }
        }

        @media(max-width:900px) {
            .dash-grid {
                grid-template-columns: 1fr
            }
        }

        .asset-list {
            background: var(--card);
            border-radius: 15px;
            border: 1px solid #222;
            height: 850px;
            overflow-y: auto
        }

        .asset-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            transition: .2s
        }

        .asset-item:hover,
        .asset-item.active {
            background: var(--card-hover)
        }

        .asset-item.active {
            border-left: 3px solid var(--primary)
        }

        .asset-info {
            flex: 1
        }

        .asset-name {
            font-weight: bold;
            font-size: .95rem;
            display: block
        }

        .asset-meta {
            font-size: .75rem;
            color: var(--text-dim);
            display: flex;
            gap: 5px
        }

        .chart-area {
            background: var(--card);
            border-radius: 15px;
            border: 1px solid #222;
            padding: 1.5rem;
            display: flex;
            flex-direction: column
        }

        .coin-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem
        }

        .coin-title h2 {
            font-family: var(--font-head);
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .coin-title span {
            font-size: 1rem;
            color: var(--text-dim);
            background: #222;
            padding: 2px 8px;
            border-radius: 5px
        }

        .live-price {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: var(--font-mono);
            margin: 5px 0
        }

        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            flex-wrap: wrap
        }

        .stat-badge {
            background: #111;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #222
        }

        .stat-badge small {
            display: block;
            color: var(--text-dim);
            font-size: .7rem;
            text-transform: uppercase
        }

        .stat-badge strong {
            color: var(--primary);
            font-family: var(--font-mono)
        }

        .info-panel {
            background: var(--card);
            border-radius: 15px;
            border: 1px solid #222;
            padding: 1.5rem;
            height: 850px;
            overflow-y: auto
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #222;
            padding-bottom: 10px
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 5px 10px;
            cursor: pointer;
            font-family: var(--font-head);
            transition: .2s;
            border-bottom: 2px solid transparent
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary)
        }

        /* New History Timeline Style */
        .hist-timeline {
            position: relative;
            margin-top: 1rem;
            padding-left: 15px
        }

        .hist-timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 2px;
            background: #333
        }

        .hist-event {
            margin-bottom: 1.5rem;
            position: relative;
            padding-left: 15px
        }

        .hist-event::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 5px;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            border: 2px solid var(--bg)
        }

        .hist-year {
            font-family: var(--font-mono);
            color: var(--accent);
            font-weight: bold;
            font-size: .9rem
        }

        .hist-text {
            font-size: .9rem;
            color: var(--text-dim);
            margin-top: 4px
        }

        /* New Tech Specs Grid */
        .tech-grid-new {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem
        }

        .tech-card {
            background: #15151e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #252530
        }

        .tech-label {
            font-size: .75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px
        }

        .tech-val {
            font-family: var(--font-mono);
            font-size: .95rem;
            color: var(--primary)
        }

        .tech-desc {
            font-size: .85rem;
            color: #777;
            margin-top: 5px;
            line-height: 1.4
        }

        .gauge-wrap {
            text-align: center;
            margin: 1rem 0;
            padding: 1rem;
            background: #111;
            border-radius: 10px
        }

        .signal {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px
        }

        footer {
            border-top: 1px solid #222;
            padding: 3rem 0;
            margin-top: 2rem;
            text-align: center;
            color: var(--text-dim)
        }

        .up {
            color: var(--green)
        }

        .down {
            color: var(--red)
        }
    </style>
</head>

                    </div>

                </div>

                <div id="tab-tech" class="info-content" style="display:none">
                    <div class="tech-grid-new" id="tech-container"></div>
                </div>
            </div>

        </div>
    </div>

                    { l: "Struktur", v: "Layer-0", d: "Relay Chain menghubungkan berbagai blockchain independen (Parachains)." },
                    { l: "Konsensus", v: "NPoS", d: "Nominated Proof-of-Stake. Token holder menominasikan validator tepercaya." },
                    { l: "Upgrade", v: "Forkless", d: "Dapat melakukan upgrade sistem tanpa hard fork yang memecah komunitas." },
                    { l: "Framework", v: "Substrate", d: "SDK modular untuk membangun blockchain kustom dalam hitungan menit." }
                ]
            },
            'tron': {
                history: [
                    { y: "2017", t: "ICO besar-besaran oleh Justin Sun. Visi desentralisasi web." },
                    { y: "2018", t: "Mainnet 'Independence Day' lepas dari ERC-20. Mengakuisisi BitTorrent." },
                    { y: "2019", t: "Dominasi di sektor USDT (Tether) karena biaya transfer murah." }
                ],
                tech: [
                    { l: "Konsensus", v: "DPoS", d: "Delegated Proof of Stake dengan 27 Super Representative." },
                    { l: "Throughput", v: "2000 TPS", d: "Optimal untuk aplikasi hiburan dan transfer stablecoin." },
                    { l: "VM", v: "TVM", d: "Kompatibel penuh dengan Ethereum Virtual Machine." }
                ]
            },
            'avalanche-2': {
                history: [
                    { y: "2020", t: "Mainnet diluncurkan. Menawarkan finalitas transaksi sub-detik." },
                    { y: "2021", t: "Program insentif 'Avalanche Rush' menarik miliaran dolar ke DeFi (Aave, Curve)." },
                    { y: "2023", t: "Kemitraan institusi (AWS, Deloitte) menggunakan Subnets." }
                ],
                tech: [
                    { l: "Konsensus", v: "Snowman (DAG)", d: "Protokol konsensus revolusioner berbasis sampling gossiping." },
                    { l: "Arsitektur", v: "Triple Chain", d: "X-Chain (Exchange), P-Chain (Platform), C-Chain (Contract - EVM)." },
                    { l: "Skaling", v: "Subnets", d: "Memungkinkan pembuatan blockchain kustom (AppChains) yang terisolasi." }
                ]
            }
        };

        const CRYPTO_LIST = ['bitcoin', 'ethereum', 'solana', 'binancecoin', 'ripple', 'cardano', 'dogecoin', 'polkadot', 'tron', 'avalanche-2'];
        let currentCoin = 'bitcoin';
        let chartInstance = null;
        const API = 'https://api.coingecko.com/api/v3';

        // === FETCHERS ===
        async function loadMarket() {
            try {
                const res = await fetch(`${API}/coins/markets?vs_currency=usd&ids=${CRYPTO_LIST.join(',')}&order=market_cap_desc&sparkline=false&price_change_percentage=24h`);
                const data = await res.json();

                renderList(data);
                renderTicker(data);
                refreshDashboard(data.find(c => c.id === currentCoin));

                // Global Mock
                document.getElementById('g-mcap').innerHTML = "$2.42T <span class='up'>(+1.2%)</span>";
                document.getElementById('g-vol').innerText = "$84.5B";
                document.getElementById('g-dom').innerText = "53.2%";
            } catch (e) { console.error(e); }
        }

        async function refreshDashboard(coin) {
            if (!coin) return;
            // Header
            document.getElementById('d-name').innerHTML = `<img src="${coin.image}" id="d-img" style="width:40px;margin-right:10px"> ${coin.name} <span>${coin.symbol.toUpperCase()}</span>`;
            document.getElementById('d-price').innerText = '$' + coin.current_price.toLocaleString();
            const isUp = coin.price_change_percentage_24h >= 0;
            const changeEl = document.getElementById('d-change');
            changeEl.innerText = (isUp ? '+' : '') + coin.price_change_percentage_24h.toFixed(2) + '%';
            changeEl.className = 'change ' + (isUp ? 'up' : 'down');

            // Stats
            document.getElementById('d-mcap').innerText = simplifyNum(coin.market_cap);
            document.getElementById('d-vol').innerText = simplifyNum(coin.total_volume);
            document.getElementById('d-high').innerText = '$' + coin.high_24h.toLocaleString();
            document.getElementById('d-ath').innerText = '$' + coin.ath.toLocaleString();

            // Desc
            try {
                const dRes = await fetch(`${API}/coins/${coin.id}?localization=false&tickers=false&market_data=false`);
                const dData = await dRes.json();
                let desc = dData.description.en ? dData.description.en.split('. ')[0] + '.' : "Deskripsi tidak tersedia.";
                document.getElementById('desc-text').innerText = desc;
            } catch (e) { document.getElementById('desc-text').innerText = ""; }

            // Content Injection (History & Tech)
            const db = COIN_DB[coin.id] || { history: [{ y: "N/A", t: "Data sejarah belum tersedia untuk aset ini." }], tech: [{ l: "Info", v: "N/A", d: "Detail teknis sedang dikurasi." }] };

            // Render History
            const hCont = document.getElementById('history-container');
            hCont.innerHTML = db.history.map(h => `<div class="hist-event"><div class="hist-year">${h.y}</div><div class="hist-text">${h.t}</div></div>`).join('');

            // Render Tech
            const tCont = document.getElementById('tech-container');
            tCont.innerHTML = db.tech.map(t => `<div class="tech-card"><div class="tech-label">${t.l}</div><div class="tech-val">${t.v}</div><div class="tech-desc">${t.d}</div></div>`).join('');

            // Load Chart
            loadChart(coin.id, 7);
        }

        // === CHART ===
        async function loadChart(id, days) {
            try {
                const res = await fetch(`${API}/coins/${id}/market_chart?vs_currency=usd&days=${days}`);
                const data = await res.json();
                renderChart(data.prices);
                calcTech(data.prices);
            } catch (e) { }
        }

        function renderChart(prices) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const d = prices.map(p => p[1]);
            const l = prices.map(p => new Date(p[0]).toLocaleDateString());

            if (chartInstance) chartInstance.destroy();

            const grad = ctx.createLinearGradient(0, 0, 0, 400);
            grad.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
            grad.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: l,
                    datasets: [{
                        data: d,
                        borderColor: '#3b82f6',
                        backgroundColor: grad,
                        borderWidth: 2,
                        fill: true,
                        pointRadius: 0,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    interaction: { intersect: false, mode: 'index' },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#222' }, ticks: { color: '#666' } }
                    }
                }
            });
        }

        // === SIMULATED TECH ANALYSIS ===
        function calcTech(prices) {
            const close = prices[prices.length - 1][1];
            const open = prices[0][1];
            const change = ((close - open) / open) * 100;

            let sig = "NEUTRAL";
            let col = "#aaa";
            let op = 0.5; // for neutral bar

            const bS = document.getElementById('bar-sell');
            const bN = document.getElementById('bar-neutral');
            const bB = document.getElementById('bar-buy');
            bS.style.opacity = 0.2; bN.style.opacity = 0.2; bB.style.opacity = 0.2;

            if (change > 5) { sig = "STRONG BUY"; col = "var(--green)"; bB.style.opacity = 1; }
            else if (change > 0) { sig = "BUY"; col = "var(--green)"; bB.style.opacity = 0.7; }
            else if (change < -5) { sig = "STRONG SELL"; col = "var(--red)"; bS.style.opacity = 1; }
            else if (change < 0) { sig = "SELL"; col = "var(--red)"; bS.style.opacity = 0.7; }
            else { bN.style.opacity = 1; }

            const el = document.getElementById('tech-signal');
            el.innerText = sig;
            el.style.color = col;
            document.getElementById('tech-reason').innerHTML = `Momentum (${change.toFixed(2)}%) <span style='color:#666'>|</span> Volatility: ${Math.abs(change * 1.2).toFixed(1)}`;
        }

        // === HELPERS ===
        function renderList(data) {
            const el = document.getElementById('asset-list');
            el.innerHTML = '';
            data.forEach(c => {
                const div = document.createElement('div');
                div.className = `asset-item ${c.id === currentCoin ? 'active' : ''}`;
                div.onclick = () => { currentCoin = c.id; loadMarket(); };
                div.innerHTML = `<img src="${c.image}" style="width:28px">
                    <div class="asset-info"><span class="asset-name">${c.symbol.toUpperCase()}</span><span class="asset-meta">#${c.market_cap_rank}</span></div>
                    <div class="asset-price"><div>$${c.current_price.toLocaleString()}</div><div style="font-size:.7rem;color:${c.price_change_percentage_24h >= 0 ? 'var(--green)' : 'var(--red)'}">${c.price_change_percentage_24h.toFixed(2)}%</div></div>`;
                el.appendChild(div);
            });
        }
        function renderTicker(data) {
            const el = document.getElementById('ticker-bar');
            el.innerHTML = '';
            [...data, ...data].forEach(c => {
                const d = document.createElement('div');
                d.className = 'ticker-item';
                d.innerHTML = `<img src="${c.image}"> <strong>${c.symbol.toUpperCase()}</strong> $${c.current_price.toLocaleString()} <span style="color:${c.price_change_percentage_24h >= 0 ? 'var(--green)' : 'var(--red)'}">${c.price_change_percentage_24h.toFixed(1)}%</span>`;
                d.onclick = () => { currentCoin = c.id; loadMarket(); };
                el.appendChild(d);
            });
        }
        function simplifyNum(n) {
            if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
            if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
            return n.toLocaleString();
        }
        function updateChartRange(d) {
            loadChart(currentCoin, d);
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); // simple cleanup
            event.target.classList.add('active');
        }
        window.switchTab = function (t) {
            ['overview', 'history', 'tech'].forEach(x => document.getElementById('tab-' + x).style.display = 'none');
            document.getElementById('tab-' + t).style.display = 'block';
            document.querySelectorAll('.info-panel .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // === RUN ===
        document.addEventListener('DOMContentLoaded', () => { loadMarket(); setInterval(loadMarket, 60000); });
    </script>
</body>

  </html>
